server {
    listen 443 ssl http2;
    server_name api.visionedge.in;

    ssl_certificate     /etc/letsencrypt/live/api.visionedge.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.visionedge.in/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Rate limiting on auth endpoints
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket support for events hub
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.visionedge.in;
    return 301 https://$host$request_uri;
}

# Rate limit zone definition (add to http {} block in nginx.conf)
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
